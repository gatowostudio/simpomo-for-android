<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="body" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ff7a6b" />
      <stop offset="55%" stop-color="#e5392f" />
      <stop offset="100%" stop-color="#b3160f" />
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69c46a" />
      <stop offset="100%" stop-color="#2e8b3d" />
    </linearGradient>
    <!-- 上に向く葉の1枚（中心 512,316 から先端 512,150）。回転で calyx を作る。 -->
    <path id="petal"
      d="M512 316 C 470 256, 470 196, 512 150 C 554 196, 554 256, 512 316 Z" />
  </defs>

  <!-- 実（トマト本体） -->
  <ellipse cx="512" cy="596" rx="378" ry="352" fill="url(#body)" />
  <!-- ハイライト -->
  <ellipse cx="372" cy="430" rx="132" ry="84" fill="#ffffff" opacity="0.18" />

  <!-- ヘタ（5枚の葉）+ 茎 -->
  <g fill="url(#leaf)">
    <use href="#petal" transform="rotate(0 512 316)" />
    <use href="#petal" transform="rotate(72 512 316)" />
    <use href="#petal" transform="rotate(144 512 316)" />
    <use href="#petal" transform="rotate(216 512 316)" />
    <use href="#petal" transform="rotate(288 512 316)" />
    <circle cx="512" cy="316" r="44" />
  </g>
  <rect x="492" y="150" width="40" height="120" rx="20" fill="#2e8b3d" />
</svg>
