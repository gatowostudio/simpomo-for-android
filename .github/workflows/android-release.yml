# Android リリース CI（issue #6）。タグ `vX.Y.Z` の push で署名付き APK をビルドし、
# GitHub Releases に**下書き**として添付する（確認後に手動で publish）。
#
# 前提（issue #1/#2 の一度きりセットアップが先に必要。docs/development.md「Android ターゲットの一度きり
# セットアップ」参照）: ローカルで `tauri android init` 済みの `src-tauri/gen/android` を
#   - landscape 固定（AndroidManifest）
#   - immersive 全画面（MainActivity）
#   - release 署名（build.gradle.kts の signingConfigs が keystore.properties を読む）
# まで手当てして**リポジトリに追跡コミット**しておくこと。こうすると CI は init も gradle patch も不要で、
# 生成テンプレ依存の脆い正規表現パッチが消え、横画面/全画面の手当てが**そのままビルドに乗る**。
# （build 出力・local.properties・keystore.properties は .gitignore 済みなので追跡されない。）
#
# ⚠️ このワークフローは**実 CI 実行による検証がまだ済んでいない**（= issue #6 の受け入れ条件）。
#
# 必要な GitHub Secrets（Settings → Secrets and variables → Actions）:
#   ANDROID_KEYSTORE_BASE64  … リリース用キーストア(.jks/.keystore)を base64 化した1行文字列
#                              生成（Git Bash）: base64 -w0 simpomo-release.jks
#                              生成（PowerShell）: [Convert]::ToBase64String([IO.File]::ReadAllBytes("simpomo-release.jks"))
#                              ※ certutil -encode は PEM ヘッダ/CRLF が混ざり base64 -d で壊れるので使わない。
#   ANDROID_KEY_ALIAS        … 署名鍵のエイリアス
#   ANDROID_KEY_PASSWORD     … 鍵パスワード
#   ANDROID_STORE_PASSWORD   … キーストアパスワード
# ※キーストア本体・パスワードは**リポジトリに絶対コミットしない**（公開リポ。.gitignore 済み）。
name: Android Release

on:
  push:
    tags:
      - "v*"

# softprops/action-gh-release が Release を作成・更新するために必要。
permissions:
  contents: write

env:
  # NDK は Tauri の Android ビルドに必須。ローカルで使用・検証した版に合わせる（gen/android 追跡と整合）。
  NDK_VERSION: "28.2.13676358"

jobs:
  # タグ(v0.1.0)と中身(package.json の version)の不一致をビルド前に弾く（desktop release.yml と同方針）。
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg. Bump the version first."
            exit 1
          fi

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if gen/android is not committed
        shell: bash
        run: |
          if [ ! -f src-tauri/gen/android/app/build.gradle.kts ]; then
            echo "::error::src-tauri/gen/android is not committed. Run the one-time setup first (docs/development.md)."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # 署名鍵を Secrets から復号して配置（リポジトリには絶対に置かない）。
      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          if [ ! -s "$RUNNER_TEMP/release.keystore" ]; then
            echo "::error::decoded keystore is empty — is the ANDROID_KEYSTORE_BASE64 secret set?"
            exit 1
          fi

      # 追跡済み build.gradle.kts の signingConfigs が読む場所（gen/android のルート）に署名情報を書く。
      - name: Write keystore.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          storePassword=$ANDROID_STORE_PASSWORD
          EOF

      # APK のみ生成（Play 配布は当面非対象＝AAB は不要。sideload 用 APK だけにして単純化）。
      - name: Build signed APK
        run: pnpm tauri android build --apk

      # 署名済み release APK を集める。未署名(*unsigned*)は除外し、1 個も無ければ loud-fail する。
      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find src-tauri/gen/android -path '*/outputs/*' -name '*-release.apk' ! -name '*unsigned*' \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts
          if [ -z "$(ls -A release-artifacts)" ]; then
            echo "::error::no signed release APK was produced (check signingConfigs / build output paths)."
            exit 1
          fi

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "simpomo ${{ github.ref_name }}"
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-artifacts/*
          body: |
            ## ダウンロード（Android）
            `*.apk` を端末に入れてインストールする（「提供元不明アプリ / 不明なアプリのインストール」の許可が必要）。

            > 横画面・全画面のポモドーロタイマーです。実機での動作確認状況は README を参照してください。
